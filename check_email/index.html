<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      text-align: center;
      background-color: #000000;
      background-image: url("background.jpg");
      background-repeat: no-repeat;
      background-size: 100% 100%;
      width: 100%;
      height: auto;
      margin: 0;
      padding: 0;
      top: 0;
      bottom: 0;
      overflow: auto;
      overflow-y: scroll;
      overflow-x: hidden;
    }
    .btn {
      padding: 0.3em 1em;
      border-radius: 12px 50px;
      color: #f3e7d3;
      background-color: #4863A0;
      font-size: 1.1em;
      border: 0;
      cursor: pointer;
      margin: 1em;
      text-decoration: none;
    }
    .btn:hover {
      background: #6667AB;
    }
    .center {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 20%;
      font-size: 25%;
      line-height: 1.2;
      color: #f3e7d3;
      margin-top: 6%;
    }
    @media (max-width: 768px) {
      /* Adjust styles for mobile devices */
      .center {
        font-size: 6%;
      }
    }
    p {
      margin-bottom: 2%;
    } 
  </style>
</head>
<body>
  <div class="center">
    <p>Please check your email,</p>
    <p>Your QR code is being generated.</p>
    <p>This might take a couple of minutes.</p>
    <p>If you don't receive any email,</p>
    <p>We have reached our</p>
    <p>100-QR-code/24hour limit.</p>
    <p>In this case, try again tomorrow.</p>
    <a href="https://aquaroulette.com" class="btn">Home</a>
  </div>
</body>
</html>
