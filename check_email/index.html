<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=0.43, maximum-scale=3.0, user-scalable=no" />
    <style>
      body {
        background-image: url("background.jpg");
        background-repeat: no-repeat;
        background-attachment: fixed;
        background-size: cover;
        margin: 10px 0px;
      }
      .btn {
        padding: 0.3em 1em;
        border-radius: 6px 25px;
        color: #158FAD;
        background-color: #4863A0;
        font-size: 1.1em;
        border: 0;
        cursor: pointer;
        margin: 1em;
        text-decoration: none;
      }
	  .btn:hover { background: #6667AB; }
      .center {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-size: 2em; /* adjust font size */
        line-height: 1.5; /* adjust line height */
		color: #A23BEC;
      }
      /* adjust font size for smaller screens */
      @media (max-width: 600px) {
        .center {
          font-size: 1.5em;
        }
      }
    </style>
  </head>
  <body>
    <div class="center">
      <b>
	  <center>
        <p>Please check your email,</p>
        <p>Your QR code is being generated.</p>
        <p>This might take a couple of minutes.</p>
        <p>If you don't receive any email,</p>
        <p>We have reached our 100-QR-code/24hour limit.</p>
        <p>In this case, try again tomorrow.</p>
		<p><a href="/" class="btn" data-role="button" data-inline="true">Home</a></p>
        </center>
      </b>
    </div>
  </body>
</html>
