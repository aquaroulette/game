<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      text-align: center;
      background-color: #000000;
      background-image: url("background.jpg");
      background-repeat: no-repeat;
      background-size: cover;
      margin: 0;
      padding: 0;
      overflow-y: scroll;
    }
    .btn {
      padding: 0.3em 1em;
      border-radius: 12px 50px;
      color: #f3e7d3;
      background-color: #4863A0;
      font-size: 1.1em;
      border: 0;
      cursor: pointer;
      margin: 1em;
      text-decoration: none;
    }
    .btn:hover {
      background: #6667AB;
    }
    .center {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 50vh;
      font-size: 2.5vw;
      line-height: 1.2;
      color: #f3e7d3;
      margin-top: 10%;
    }
    @media (max-width: 768px) {
      /* Adjust styles for mobile devices */
      .center {
        font-size: 8vw;
      }
    }
  </style>
</head>
<body>
  <div class="center">
    Please check your email,
    <p>Your QR code is being generated.</p>
    <p>This might take a couple of minutes.
    If you don't receive any email,
    We have reached our 100-QR-code/24hour limit.
    In this case, try again tomorrow.</p>
    <a href="https://aquaroulette.com" class="btn">Home</a>
  </div>
</body>
</html>
