<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Submission</title>
    <script>
        var uniqueToken;

        function submitForm() {
            var textInput = document.getElementById("text-input").value;
            var numberInput = document.getElementById("number-input").value;

            var mixedLettersNumbersUser = generateMixedString(30);

            uniqueToken = generateMixedString(10);
            console.log('Generated Token:', uniqueToken);

            var formData = new FormData();
            formData.append("text", textInput);
            formData.append("number", numberInput);
            formData.append("mixedUser", mixedLettersNumbersUser);
            formData.append("token", uniqueToken);

            fetch('https://script.google.com/macros/s/AKfycbw5MhT-UvVU2HUjYFSjAESQmmx8weFLDZXAz-5XBjkykf-qkC-hy3x11fv8QeErzDOK-g/exec', {
                method: 'POST',
                body: formData,
                mode: 'cors'
            })
            .then(response => response.json())
            .then(data => {
                console.log('Success:', data);
                waitForERowData();
            })
            .catch((error) => {
                console.error('Error:', error);
            });
        }

        function waitForERowData() {
            var checkInterval = 2000; // 5 seconds
            var maxAttempts = 200;
            var attempts = 0;

            var intervalId = setInterval(function () {
                fetch('https://script.google.com/macros/s/AKfycbw5MhT-UvVU2HUjYFSjAESQmmx8weFLDZXAz-5XBjkykf-qkC-hy3x11fv8QeErzDOK-g/exec?token=' + uniqueToken, {
                    method: 'GET',
                    mode: 'cors'
                })
                .then(response => response.json())
                .then(data => {
                    console.log('Response from Google Apps Script:', data);

                    var eRowData = data.eRowData;

                    if (eRowData !== undefined) {
                        clearInterval(intervalId);
                        document.getElementById("response").innerText = "Response from Sheet (E Row): " + eRowData;
                    } else if (++attempts >= maxAttempts) {
                        clearInterval(intervalId);
                        console.log("Reached maximum attempts, stopping checking.");
                    }
                })
                .catch((error) => {
                    console.error('Error:', error);
                });
            }, checkInterval);
        }

        function generateMixedString(length) {
            var result = '';
            var characters = '!@#$%^&*()_+*-qwertyuiop[]asdfghjkl;zxcvbnm,./1234567890';
            for (var i = 0; i < length; i++) {
                result += characters.charAt(Math.floor(Math.random() * characters.length));
            }
            return result;
        }
    </script>
</head>
<body>
    <form onsubmit="event.preventDefault(); submitForm();">
        <label for="text-input">Enter Text (0-37 characters): </label>
        <input type="text" id="text-input" maxlength="37" required><br>

        <label for="number-input">Choose a Number (0-36): </label>
        <input type="number" id="number-input" min="0" max="36" required><br>

        <button type="submit">Submit</button>
    </form>

    <div id="response-container">
        <p id="response"></p>
    </div>
</body>
</html>
