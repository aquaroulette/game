<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dogecoin Form</title>
    
    <!-- Include Google Apps Script library -->
    <script src="https://script.google.com/macros/s/AKfycby2z_hSfd_W9Zw_aqeOXKW-AMaHSzSZJN_rnn4ie-RYMcNOGNhassvjwMzOcuxWoNCAvg/exec"></script>
</head>
<body>

<p>Access the form <a href="https://script.google.com/macros/s/AKfycby2z_hSfd_W9Zw_aqeOXKW-AMaHSzSZJN_rnn4ie-RYMcNOGNhassvjwMzOcuxWoNCAvg/exec" target="_blank">here</a>.</p>

<form id="dogecoinForm">
    <label for="user">User:</label>
    <input type="text" id="user" name="user" required><br>

    <label for="number">Number (0-36):</label>
    <input type="number" id="number" name="number" min="0" max="36" required><br>

    <label for="amount">Amount:</label>
    <select id="amount" name="amount">
        <option value="100">100 DOGE</option>
        <option value="1000">1000 DOGE</option>
        <option value="10000">10000 DOGE</option>
    </select><br>

    <button type="button" onclick="submitForm()">Submit</button>
</form>

<div id="response"></div>

<script>
    async function submitForm() {
        const user = document.getElementById('user').value;
        const number = document.getElementById('number').value;
        const amount = document.getElementById('amount').value;

        // Call Google Apps Script function to handle the server-side interaction
        google.script.run.withSuccessHandler(displayAddress).generateAddress(user, number, amount);
    }

    function displayAddress(address) {
        // Display the address in the HTML
        document.getElementById('response').innerText = `New address: ${address}`;
    }
</script>

</body>
</html>
