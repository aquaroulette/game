<!DOCTYPE html>
<html>
<head>
    <title>Form Submission and Text Display</title>
</head>
<body>
    <form id="myForm">
        <label for="number">Enter a number (0 to 36):</label>
        <input type="number" id="number" name="number" min="0" max="36" required>
        <br>

        <label for="letters">Enter 34 random letters:</label>
        <input type="text" id="letters" name="letters" pattern="[A-Za-z]{3}" required>
        <br>


        <input type="button" value="Submit" onclick="submitForm()">
    </form>

    <div id="response"></div>
    
    <script>
        function submitForm() {
            var number = document.getElementById("number").value;
            var letters = document.getElementById("letters").value;
            
            // Send the form data to Google Sheets using AJAX
            var xhr = new XMLHttpRequest();
            xhr.open("POST", "https://script.google.com/macros/s/AKfycbxzzgxLwRBtPoC9VgNMUa9ko3Cg7t6lGhlGxt897BHG7HUaHJKVBkTS0B3PYSQLFnMHDQ/exec", true);
            xhr.setRequestHeader("Content-Type", "application/x-www-form-urlencoded");
            xhr.onreadystatechange = function () {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    var responseText = xhr.responseText;

                    // Display the response text on the HTML page
                    document.getElementById("response").innerHTML = responseText;
                }
            };
            xhr.send("number=" + number + "&letters=" + letters);
        }

        function getTextFromServer() {
            var url = 'https://script.google.com/macros/s/AKfycbxzzgxLwRBtPoC9VgNMUa9ko3Cg7t6lGhlGxt897BHG7HUaHJKVBkTS0B3PYSQLFnMHDQ/exec';
            var displayElement = document.getElementById('response');
            
            var xhr = new XMLHttpRequest();
            xhr.open('GET', url, true);
            xhr.onreadystatechange = function () {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    var textFromServer = xhr.responseText;
                    displayElement.innerHTML = textFromServer;
                }
            };
            xhr.send();
        }
        
        // Periodically check for new text every 1 second
        setInterval(getTextFromServer, 1000);
        
        // Initial check for text
        getTextFromServer();
    </script>
</body>
</html>
