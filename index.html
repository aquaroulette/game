<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>AquaRoulette</title>

<link rel="stylesheet" href="styles.css">

<script src="https://cdn.jsdelivr.net/npm/qrcode@latest" defer></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="java.js" defer></script>
</head>

<body>

<div class="container">

    <div class="title">
        <h1>AquaRoulette</h1>
        <p>You're welcome to try Your own luck today!</p>
    </div>

    <!-- LIVE -->
    <div class="live-screen">
        <video id="player" autoplay muted playsinline></video>
    </div>

    <!-- WALLET -->
    <div class="wallet-box">
        <label>Enter Your Ðogecoin deposit/receiving address</label>
        <input
            type="text"
            id="wallet"
            class="wallet-input"
            minlength="34"
            maxlength="34"
        />
    </div>

    <!-- ROULETTE -->
    <div class="roulette">

        <div class="zero-row">
            <button class="ball green" data-number="0">0</button>
        </div>

        <div class="grid" id="grid"></div>

    </div>

    <!-- SUBMIT -->
    <div style="text-align:center; margin-top:25px;">

        <button id="submit-button" onclick="submitForm()">
            Submit
        </button>

        <div id="please-wait" style="display:none; margin-top:10px;">
            Generating Ðogecoin payment QR. Please wait
            <span id="dots">...</span>
        </div>

    </div>

    <!-- RESULT -->
    <div class="selection">

        <h2>
            Your Pick:
            <span id="selectedNumber">—</span>
        </h2>

        <p class="wallet-preview">
            Your Wallet:
            <span class="highlight" id="selectedWallet">—</span>
        </p>

        <div id="qrCode"></div>

        <button id="copy-button" style="display:none;">
            Copy Address
        </button>

        <div id="address-container"></div>

        <div id="payment-status" style="display:none;">
            Waiting for Your payment...
            <p>Min: 30Ð   Max: 1000Ð</p>
        </div>

    </div>

</div>

</body>
</html>
